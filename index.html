<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Stillpoint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/hud.css" />
    <link rel="stylesheet" href="/styles/dev.css" />
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <div id="hud" class="hidden">
      <header id="title-bar">
        <h1>Bedroom</h1>
        <div id="header-controls">
          <button id="zoom-back-btn" class="hidden" type="button">← Back</button>
          <div id="view-controls">
            <button id="rotate-left" type="button" title="Rotate left (Q / ←)">↺</button>
            <button id="rotate-right" type="button" title="Rotate right (E / →)">↻</button>
          </div>
          <button id="journal-toggle" type="button">Journal</button>
        </div>
      </header>

      <div id="cursor-label">Walk</div>

      <div id="thought-toast" class="hidden">
        <p id="thought-text"></p>
      </div>

      <div id="examine-panel" class="panel hidden">
        <h2 id="examine-title">Examine</h2>
        <p id="examine-body"></p>
        <button id="examine-close" type="button">Close</button>
      </div>

      <aside id="journal-panel" class="panel hidden">
        <h2>Journal</h2>
        <select id="journal-list" size="5"></select>
        <p id="journal-detail">Clues appear here.</p>
      </aside>

      <footer id="inventory-bar"></footer>
    </div>

    <div id="clock-modal" class="modal hidden">
      <div class="modal-content panel">
        <h2>Set the Clock</h2>
        <label>Hour (1–12) <input id="clock-hour" type="number" min="1" max="12" value="12" /></label>
        <label>Minute (0–59) <input id="clock-minute" type="number" min="0" max="59" value="0" /></label>
        <button id="clock-submit" type="button">Set Time</button>
        <button id="clock-close" type="button">Cancel</button>
      </div>
    </div>

    <div id="photo-modal" class="modal hidden">
      <div class="modal-content panel">
        <h2>Photo Backs</h2>
        <p>Click tiles to swap. Spell the word.</p>
        <div id="photo-tiles"></div>
        <button id="photo-submit" type="button">Confirm</button>
        <button id="photo-close" type="button">Cancel</button>
      </div>
    </div>

    <div id="combine-modal" class="modal hidden">
      <div class="modal-content panel">
        <h2>Combine Items</h2>
        <select id="combine-a"></select>
        <select id="combine-b"></select>
        <button id="combine-submit" type="button">Combine</button>
        <button id="combine-close" type="button">Cancel</button>
      </div>
    </div>

    <div id="padlock-modal" class="modal hidden">
      <div class="modal-content panel">
        <h2>Door Padlock</h2>
        <input id="padlock-entry" type="text" placeholder="STILLPOINT" autocomplete="off" />
        <button id="padlock-submit" type="button">Unlock</button>
        <button id="padlock-close" type="button">Cancel</button>
      </div>
    </div>

    <div id="win-overlay" class="modal hidden">
      <div class="modal-content panel win-panel">
        <h2 id="win-title">Escaped</h2>
        <p id="win-body"></p>
        <button id="win-restart" type="button">Play Again</button>
      </div>
    </div>

    <div id="main-menu" class="menu-overlay">
      <div class="menu-content">
        <h1 class="menu-title">Project Stillpoint</h1>
        
        <div class="slots-container">
          <!-- Slot 1 -->
          <div class="slot-card" id="slot-card-1">
            <div class="slot-header">Slot 1</div>
            <div class="slot-info" id="slot-info-1">Empty Slot</div>
            <div class="slot-actions">
              <button class="menu-btn new-game-btn" data-slot="1">New Game</button>
              <button class="menu-btn load-game-btn hidden" data-slot="1">Load Game</button>
              <button class="menu-btn delete-btn hidden" data-slot="1">Delete</button>
            </div>
          </div>
          <!-- Slot 2 -->
          <div class="slot-card" id="slot-card-2">
            <div class="slot-header">Slot 2</div>
            <div class="slot-info" id="slot-info-2">Empty Slot</div>
            <div class="slot-actions">
              <button class="menu-btn new-game-btn" data-slot="2">New Game</button>
              <button class="menu-btn load-game-btn hidden" data-slot="2">Load Game</button>
              <button class="menu-btn delete-btn hidden" data-slot="2">Delete</button>
            </div>
          </div>
          <!-- Slot 3 -->
          <div class="slot-card" id="slot-card-3">
            <div class="slot-header">Slot 3</div>
            <div class="slot-info" id="slot-info-3">Empty Slot</div>
            <div class="slot-actions">
              <button class="menu-btn new-game-btn" data-slot="3">New Game</button>
              <button class="menu-btn load-game-btn hidden" data-slot="3">Load Game</button>
              <button class="menu-btn delete-btn hidden" data-slot="3">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Escape Menu -->
    <div id="escape-menu" class="menu-overlay hidden">
      <div class="menu-content escape-content">
        <h2 class="menu-title escape-title">Paused</h2>
        
        <div class="settings-group">
          <div class="setting-row">
            <label for="mute-music">Mute Music</label>
            <input type="checkbox" id="mute-music" class="menu-checkbox" />
          </div>
          
          <div class="setting-row">
            <label for="music-volume">Music Volume</label>
            <input type="range" id="music-volume" min="0" max="1" step="0.05" class="menu-slider" />
          </div>

          <div class="dev-toggle-row">
            <button id="dev-toggle-btn" class="menu-btn">Toggle Dev Mode</button>
          </div>
        </div>
        
        <button id="resume-btn" class="menu-btn resume-btn">Resume</button>
      </div>
    </div>

    <!-- Intro Words Screen -->
    <div id="intro-words-overlay" class="menu-overlay hidden"></div>

    <!-- Dev Mode Dashboard -->
    <div id="dev-panel" class="hidden">
      <div class="dev-header">
        <h3>Dev Mode</h3>
        <span class="dev-indicator">Editor</span>
      </div>
      
      <div class="dev-selection-status">
        Selected: <span id="dev-selected-name">None</span>
      </div>
      
      <div class="dev-controls-group">
        <!-- Position X -->
        <div class="dev-row">
          <label for="dev-pos-x">Pos X</label>
          <div class="nudge-container">
            <button type="button" class="nudge-btn" id="dev-x-dec">-</button>
            <input type="text" id="dev-pos-x" class="dev-input" value="0.00" />
            <button type="button" class="nudge-btn" id="dev-x-inc">+</button>
          </div>
        </div>

        <!-- Position Y -->
        <div class="dev-row">
          <label for="dev-pos-y">Pos Y</label>
          <div class="nudge-container">
            <button type="button" class="nudge-btn" id="dev-y-dec">-</button>
            <input type="text" id="dev-pos-y" class="dev-input" value="0.00" />
            <button type="button" class="nudge-btn" id="dev-y-inc">+</button>
          </div>
        </div>

        <!-- Position Z -->
        <div class="dev-row">
          <label for="dev-pos-z">Pos Z</label>
          <div class="nudge-container">
            <button type="button" class="nudge-btn" id="dev-z-dec">-</button>
            <input type="text" id="dev-pos-z" class="dev-input" value="0.00" />
            <button type="button" class="nudge-btn" id="dev-z-inc">+</button>
          </div>
        </div>

        <!-- Rotation Y -->
        <div class="dev-row">
          <label for="dev-rot-y">Rot Y°</label>
          <div class="nudge-container">
            <button type="button" class="nudge-btn" id="dev-ry-dec">-</button>
            <input type="text" id="dev-rot-y" class="dev-input" value="0" />
            <button type="button" class="nudge-btn" id="dev-ry-inc">+</button>
          </div>
        </div>
      </div>
      
      <div class="dev-actions">
        <div class="dev-row-buttons">
          <button id="dev-undo" class="dev-btn" title="Undo (Ctrl+Z)" disabled>Undo</button>
          <button id="dev-redo" class="dev-btn" title="Redo (Ctrl+Y)" disabled>Redo</button>
        </div>
        <button id="dev-copy-json" class="dev-btn dev-btn-primary">Copy Layout JSON</button>
        <button id="dev-reset-layout" class="dev-btn dev-btn-danger">Reset Layout</button>
        <button id="dev-close-btn" class="dev-btn">Exit Dev Mode</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
